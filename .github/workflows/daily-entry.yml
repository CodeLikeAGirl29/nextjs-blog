name: Daily entry

on:
  schedule:
    # 07:00 UTC every day — edit to taste (crontab.guru helps)
    - cron: "0 7 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write # needed so the workflow can push the new post back

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate today's post
        run: npm run generate:post

      - name: Commit and push if a new file was created
        run: |
          git config user.name "field-notes-bot"
          git config user.email "actions@users.noreply.github.com"
          git add posts/
          if git diff --cached --quiet; then
            echo "No new entry today, nothing to commit."
          else
            git commit -m "chore: file today's entry"
            git push
          fi
